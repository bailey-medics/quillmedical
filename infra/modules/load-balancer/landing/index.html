<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quill Medical</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8f9fa;
        color: #212529;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        max-width: 600px;
        padding: 3rem 2rem;
      }
      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: #1a365d;
      }
      .subtitle {
        font-size: 1.1rem;
        color: #6c757d;
        margin-bottom: 2.5rem;
      }
      .links {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        align-items: center;
      }
      a {
        display: block;
        width: 100%;
        max-width: 360px;
        padding: 1rem 1.5rem;
        background: #1a365d;
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 500;
        transition: background 0.2s;
      }
      a:hover {
        background: #2a4a7f;
      }
      .env {
        font-size: 0.85rem;
        color: #94a3b8;
        margin-top: 0.25rem;
      }
      footer {
        margin-top: 3rem;
        font-size: 0.85rem;
        color: #adb5bd;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Quill Medical</h1>
      <p class="subtitle">Clinical platform</p>
      <div class="links">
        <a href="https://app.quill-medical.com">
          Production
          <div class="env">app.quill-medical.com</div>
        </a>
        <a href="https://staging.quill-medical.com">
          Staging
          <div class="env">staging.quill-medical.com</div>
        </a>
        <a href="https://teaching.quill-medical.com">
          Teaching
          <div class="env">teaching.quill-medical.com</div>
        </a>
      </div>
      <footer>&copy; 2026 Quill Medical</footer>
    </div>
  </body>
</html>
