# Branch CI — runs on all development branches.
# - Fast tier: runs on every push (lint, typecheck, unit tests, storybook build)
# - Heavy tier: runs on non-draft PRs only (storybook interaction tests, Semgrep)
# - Opens a draft pull request to main for feature/* and copilot/* branches
#
# Covers: feature/*, copilot/*, renovate/*, dependabot/*, and any
# other non-protected branch.
#
# When the PR is merged by a human, the push to main triggers
# deploy.yml. This workflow is intentionally self-contained
# and does NOT share code with other pipelines — a change here
# cannot affect production workflows.
name: Branch CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types: [ready_for_review, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  packages: write

concurrency:
  group: feature-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # FAST TIER — runs on every push (github.event_name == 'push')
  # ==========================================================================

  # ---------- Python ----------
  python_checks:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Python ${{ matrix.task }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        task: [styling, unit]
        python: ['3.13']

    env:
      PRE_COMMIT_HOME: ${{ github.workspace }}/.pre-commit-cache
      PIP_CACHE_DIR:   ${{ github.workspace }}/.pip-cache
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      # ---- caches (pick per task) ----
      - name: Cache pre-commit & venv (styling)
        if: matrix.task == 'styling'
        uses: actions/cache@v5
        with:
          path: |
            .venv
            ${{ env.PRE_COMMIT_HOME }}
            ${{ env.PIP_CACHE_DIR }}
          key: pc-styling-${{ runner.os }}-py${{ matrix.python }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pc-styling-${{ runner.os }}-py${{ matrix.python }}-
            pc-styling-${{ runner.os }}-

      # ---- styling steps ----
      - name: Ensure venv + pre-commit (styling)
        if: matrix.task == 'styling'
        run: |
          if [ ! -x .venv/bin/python ]; then
            echo "Creating new virtual environment..."
            rm -rf .venv  # Remove corrupted cache
            python -m venv .venv
          else
            echo "Using cached .venv"
          fi
          # Always ensure pre-commit is installed (quick if already present)
          .venv/bin/python -m pip install -U pip
          .venv/bin/python -m pip install "pre-commit>=3,<5"

      - name: Warm pre-commit hooks (styling)
        if: matrix.task == 'styling'
        run: |
          . .venv/bin/activate
          pre-commit install-hooks

      - name: Run pre-commit (styling)
        if: matrix.task == 'styling'
        run: |
          . .venv/bin/activate
          pre-commit run --all-files --show-diff-on-failure --color=always


      - name: Cache Poetry venv & pip (unit)
        if: matrix.task == 'unit'
        uses: actions/cache@v5
        with:
          path: |
            backend/.venv
            ${{ env.PIP_CACHE_DIR }}
          key: pc-unit-${{ runner.os }}-py${{ matrix.python }}-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            pc-unit-${{ runner.os }}-py${{ matrix.python }}-
            pc-unit-${{ runner.os }}-


      - name: Install Poetry (unit)
        if: matrix.task == 'unit'
        run: |
          python -m pip install -U pip poetry
          # in-project venv to make caching deterministic
          poetry config virtualenvs.in-project true


      - name: Install backend deps (unit)
        if: matrix.task == 'unit'
        working-directory: backend
        run: |
          poetry install --with dev --no-interaction --no-ansi

      - name: Checkout teaching-tooling (unit)
        if: matrix.task == 'unit'
        uses: actions/checkout@v6
        with:
          repository: bailey-medics/teaching-tooling
          path: teaching-tooling

      - name: Pytest (unit)
        if: matrix.task == 'unit'
        working-directory: backend
        env:
          TEACHING_TOOLING_SCRIPTS_PATH: ${{ github.workspace }}/teaching-tooling/scripts
        run: |
          poetry run pytest -q -m "not integration and not e2e" --maxfail=1 --disable-warnings



  # ---------- JS: run multiple tools in parallel via matrix ----------
  typescript_checks:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        task: [eslint, prettier, stylelint, "typecheck:all", "unit-test:run", "storybook:build"]
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack & pin Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate
          yarn --version

      - name: Cache Yarn
        id: cache_yarn
        uses: actions/cache@v5
        with:
          path: |
            frontend/.yarn/cache
            frontend/.yarn/install-state.gz
            frontend/node_modules
          key: ${{ runner.os }}-yarn4-nm-${{ hashFiles('frontend/yarn.lock', 'frontend/.yarnrc.yml') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-nm-

      - name: Install deps
        if: steps.cache_yarn.outputs.cache-hit != 'true'
        working-directory: frontend
        run: yarn install --immutable

      - name: Cache Storybook build artifacts
        if: matrix.task == 'storybook:build'
        uses: actions/cache@v5
        with:
          path: |
            frontend/node_modules/.vite
            frontend/.storybook-cache
          key: ${{ runner.os }}-storybook-${{ hashFiles('frontend/src/**/*.{ts,tsx}', 'frontend/.storybook/**/*') }}
          restore-keys: |
            ${{ runner.os }}-storybook-

      - name: Cache ESLint
        if: matrix.task == 'eslint'
        uses: actions/cache@v5
        with:
          path: frontend/.eslintcache
          key: ${{ runner.os }}-eslint-${{ hashFiles('frontend/**/*.{ts,tsx,js,jsx}') }}
          restore-keys: |
            ${{ runner.os }}-eslint-

      - name: Run ${{ matrix.task }}
        working-directory: frontend
        run: |
          case "${{ matrix.task }}" in
            eslint)   yarn eslint ;;
            prettier) yarn prettier ;;
            stylelint) yarn stylelint ;;
            typecheck) yarn typecheck ;;
            "typecheck:all") yarn typecheck:all ;;
            "unit-test:run") yarn unit-test:run ;;
            "storybook:build") yarn storybook:build ;;
          esac



  # ---------- Frontend security (Semgrep) — MOVED TO HEAVY TIER ----------
  # Kept here commented for reference; the heavy_semgrep job below runs this.
  # frontend_security:

  # ---------- Open PR to main ----------
  # Only for feature/* and copilot/* branches — Renovate/Dependabot create their own PRs.
  open-pr:
    if: github.event_name == 'push' && (startsWith(github.ref_name, 'feature/') || startsWith(github.ref_name, 'copilot/'))
    runs-on: ubuntu-latest
    name: Open pull request
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a PR already exists for this branch targeting main
          EXISTING=$(gh pr list \
            --head "$GITHUB_REF_NAME" \
            --base main \
            --json number \
            --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $GITHUB_REF_NAME"
            exit 0
          fi

          # Use the latest commit message as the PR title
          TITLE=$(git log -1 --pretty=%s)

          # Derive label from branch prefix (feature/* → feature, copilot/* → copilot)
          LABEL="${GITHUB_REF_NAME%%/*}"

          # Ensure label exists on the repo (no-op if already present)
          gh label create "$LABEL" --color "0e8a16" 2>/dev/null || true

          gh pr create \
            --base main \
            --head "$GITHUB_REF_NAME" \
            --title "$TITLE" \
            --body "Auto-created PR for \`$GITHUB_REF_NAME\`." \
            --label "$LABEL" \
            --draft



  # ==========================================================================
  # HEAVY TIER — runs on non-draft PRs only (github.event_name == 'pull_request')
  # ==========================================================================

  # ---------- Storybook interaction tests ----------
  # Name matches the required check in branch_rules.tf (backward compat)
  heavy_storybook_tests:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    name: typescript_checks (storybook:test:ci)
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack & pin Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate
          yarn --version

      - name: Cache Yarn
        uses: actions/cache@v5
        with:
          path: |
            frontend/.yarn/cache
            frontend/.yarn/install-state.gz
            frontend/node_modules
          key: ${{ runner.os }}-yarn4-nm-${{ hashFiles('frontend/yarn.lock', 'frontend/.yarnrc.yml') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-nm-

      - name: Install deps
        working-directory: frontend
        run: yarn install --immutable

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Cache Storybook build artifacts
        uses: actions/cache@v5
        with:
          path: |
            frontend/node_modules/.vite
            frontend/.storybook-cache
          key: ${{ runner.os }}-storybook-${{ hashFiles('frontend/src/**/*.{ts,tsx}', 'frontend/.storybook/**/*') }}
          restore-keys: |
            ${{ runner.os }}-storybook-

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Storybook interaction tests
        working-directory: frontend
        run: yarn storybook:test:ci



  # ---------- Semgrep (frontend SAST) ----------
  heavy_semgrep:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    name: Semgrep (frontend SAST)
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - name: Install Semgrep
        run: pipx install semgrep

      - name: Run Semgrep
        working-directory: frontend
        env:
          SEMGREP_LOG_LEVEL: error
          SEMGREP_DISABLE_ANALYTICS: "1"
          SEMGREP_NO_VERSION_CHECK: "1"
        run: semgrep --config .semgrep.yml --error

  # ---------- Prebuild CI app images for E2E ----------
  heavy_e2e_images:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    name: E2E image build (GHCR)
    timeout-minutes: 20
    env:
      CI_IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/quillmedical-ci_backend:${{ github.sha }}
      CI_IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/quillmedical-ci_frontend:${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - name: Checkout teaching-tooling
        uses: actions/checkout@v6
        with:
          repository: bailey-medics/teaching-tooling
          path: teaching-tooling

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./backend/Dockerfile
          target: prod
          push: true
          tags: ${{ env.CI_IMAGE_BACKEND }}
          cache-from: type=gha,scope=ci-backend
          cache-to: type=gha,mode=max,scope=ci-backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./frontend/Dockerfile
          target: prod
          push: true
          tags: ${{ env.CI_IMAGE_FRONTEND }}
          build-args: |
            VITE_CLINICAL_SERVICES_ENABLED=false
          cache-from: type=gha,scope=ci-frontend
          cache-to: type=gha,mode=max,scope=ci-frontend

  # ---------- E2E (Playwright) ----------
  heavy_e2e:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    name: E2E (Playwright)
    timeout-minutes: 20
    needs: [heavy_e2e_images]
    env:
      CI_IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/quillmedical-ci_backend:${{ github.sha }}
      CI_IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/quillmedical-ci_frontend:${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull prebuilt CI images
        run: |
          docker pull "$CI_IMAGE_BACKEND"
          docker pull "$CI_IMAGE_FRONTEND"
          # Compose uses local tags from compose.ci.yml, so apply local tags to pulled images.
          docker tag "$CI_IMAGE_BACKEND" quillmedical-ci_backend:latest
          docker tag "$CI_IMAGE_FRONTEND" quillmedical-ci_frontend:latest

      - name: Start CI stack
        run: docker compose -f compose.ci.yml up --wait --wait-timeout 120

      - name: Seed test data
        run: docker exec ci_backend python scripts/seed_ci.py

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack & pin Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn
        uses: actions/cache@v5
        with:
          path: |
            frontend/.yarn/cache
            frontend/.yarn/install-state.gz
            frontend/node_modules
          key: ${{ runner.os }}-yarn4-nm-${{ hashFiles('frontend/yarn.lock', 'frontend/.yarnrc.yml') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-nm-

      - name: Install deps
        working-directory: frontend
        run: yarn install --immutable

      - name: Cache Playwright browsers
        id: cache_playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.cache_playwright.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f compose.ci.yml logs --tail=100
