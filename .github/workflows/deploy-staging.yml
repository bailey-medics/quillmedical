# Deploy to staging + teaching environments and publish docs to GitHub Pages
# when main branch is updated.
name: Deploy to staging

on:
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write   # Workload Identity Federation + GitHub Pages
  pages: write       # GitHub Pages deployment

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  GCP_REGION: europe-west2
  AR_REGISTRY: europe-west2-docker.pkg.dev
  VITE_VAPID_PUBLIC: BC0B26JO27tGc5qkbt2-QzY8M7_0u3gt5hmFj1RGWvZp9Vr9fDQ3-lpQ6YxqNlU0fFKlIUzCnb-baAE0rzIL-Ys

jobs:
  # ---------- Detect which services changed ----------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - "backend/**"
              - "shared/**"
            frontend:
              - "frontend/**"
              - "shared/**"

  # ---------- Build and push Docker images ----------
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      matrix:
        include:
          - service: backend
            context: .
            dockerfile: ./backend/Dockerfile
            changed: ${{ needs.changes.outputs.backend }}
          - service: frontend
            context: .
            dockerfile: ./frontend/Dockerfile
            changed: ${{ needs.changes.outputs.frontend }}
    # Only build if the service actually changed
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ matrix.changed == 'true' }}

      - name: Authenticate to GCP (staging)
        if: ${{ matrix.changed == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        if: ${{ matrix.changed == 'true' }}
        run: gcloud auth configure-docker ${{ env.AR_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        if: ${{ matrix.changed == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Build and push to staging AR
        if: ${{ matrix.changed == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.AR_REGISTRY }}/${{ secrets.GCP_STAGING_PROJECT_ID }}/quill/${{ matrix.service }}:main-${{ github.sha }}
            ${{ env.AR_REGISTRY }}/${{ secrets.GCP_STAGING_PROJECT_ID }}/quill/${{ matrix.service }}:main
          build-args: |
            VITE_VAPID_PUBLIC=${{ env.VITE_VAPID_PUBLIC }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Authenticate to GCP (teaching)
        if: ${{ matrix.changed == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_TEACHING_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_TEACHING_SERVICE_ACCOUNT }}

      - name: Configure Docker for teaching AR
        if: ${{ matrix.changed == 'true' }}
        run: gcloud auth configure-docker ${{ env.AR_REGISTRY }} --quiet

      - name: Push to teaching AR
        if: ${{ matrix.changed == 'true' }}
        run: |
          docker tag \
            ${{ env.AR_REGISTRY }}/${{ secrets.GCP_STAGING_PROJECT_ID }}/quill/${{ matrix.service }}:main-${{ github.sha }} \
            ${{ env.AR_REGISTRY }}/${{ secrets.GCP_TEACHING_PROJECT_ID }}/quill/${{ matrix.service }}:main-${{ github.sha }}
          docker tag \
            ${{ env.AR_REGISTRY }}/${{ secrets.GCP_STAGING_PROJECT_ID }}/quill/${{ matrix.service }}:main-${{ github.sha }} \
            ${{ env.AR_REGISTRY }}/${{ secrets.GCP_TEACHING_PROJECT_ID }}/quill/${{ matrix.service }}:main
          docker push ${{ env.AR_REGISTRY }}/${{ secrets.GCP_TEACHING_PROJECT_ID }}/quill/${{ matrix.service }}:main-${{ github.sha }}
          docker push ${{ env.AR_REGISTRY }}/${{ secrets.GCP_TEACHING_PROJECT_ID }}/quill/${{ matrix.service }}:main

  # ---------- Deploy to staging ----------
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [changes, build]
    # Run even if build was skipped (no changes), to handle shared infra updates
    if: always() && !failure() && !cancelled()
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (staging)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend to staging
        if: ${{ needs.changes.outputs.backend == 'true' }}
        run: |
          gcloud run services update quill-backend-staging \
            --project=${{ secrets.GCP_STAGING_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --image=${{ env.AR_REGISTRY }}/${{ secrets.GCP_STAGING_PROJECT_ID }}/quill/backend:main-${{ github.sha }}

      - name: Deploy frontend to staging
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        run: |
          gcloud run services update quill-frontend-staging \
            --project=${{ secrets.GCP_STAGING_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --image=${{ env.AR_REGISTRY }}/${{ secrets.GCP_STAGING_PROJECT_ID }}/quill/frontend:main-${{ github.sha }}

      - name: Smoke test staging
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://staging.quill-medical.com/api/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Staging health check failed after 5 attempts"
          exit 1

  # ---------- Deploy to teaching ----------
  deploy-teaching:
    name: Deploy to teaching
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: always() && !failure() && !cancelled()
    environment: teaching
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (teaching)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_TEACHING_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_TEACHING_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend to teaching
        if: ${{ needs.changes.outputs.backend == 'true' }}
        run: |
          gcloud run services update quill-backend-teaching \
            --project=${{ secrets.GCP_TEACHING_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --image=${{ env.AR_REGISTRY }}/${{ secrets.GCP_TEACHING_PROJECT_ID }}/quill/backend:main-${{ github.sha }}

      - name: Deploy frontend to teaching
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        run: |
          gcloud run services update quill-frontend-teaching \
            --project=${{ secrets.GCP_TEACHING_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --image=${{ env.AR_REGISTRY }}/${{ secrets.GCP_TEACHING_PROJECT_ID }}/quill/frontend:main-${{ github.sha }}

      - name: Smoke test teaching
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://teaching.quill-medical.com/api/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Teaching health check passed"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Teaching health check failed after 5 attempts"
          exit 1

  # ---------- Build documentation for GitHub Pages ----------
  docs-build:
    name: Build documentation
    runs-on: ubuntu-latest
    env:
      OPENAPI_SRC: docs/docs/code/swagger/openapi.json
      OPENAPI_DST: site/code/swagger/openapi.json
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # ---------- Frontend docs (Node + Yarn) ----------
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack & pin Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate
          yarn --version

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            frontend/.yarn/cache
            frontend/.yarn/install-state.gz
            frontend/node_modules
          key: ${{ runner.os }}-yarn4-docs-${{ hashFiles('frontend/yarn.lock', 'frontend/.yarnrc.yml') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-docs-
            ${{ runner.os }}-yarn4-

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Cache Storybook & Vite build artifacts
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules/.vite
            frontend/.storybook-cache
            frontend/storybook-static
          key: ${{ runner.os }}-storybook-build-${{ hashFiles('frontend/src/**/*.{ts,tsx,js,jsx,json}', 'frontend/.storybook/**/*') }}
          restore-keys: |
            ${{ runner.os }}-storybook-build-

      - name: Generate JSON from YAML for TypeScript types
        working-directory: frontend
        run: yarn generate:types

      - name: Build Storybook static site
        working-directory: frontend
        run: yarn storybook:build

      - name: Build frontend docs
        working-directory: frontend
        run: yarn docs:build

      - name: Collect frontend docs into /site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site

          CANDIDATES=(
            "docs/docs/frontend"
            "docs/docs/storybook"
          )

          copied="false"
          for d in "${CANDIDATES[@]}"; do
            if [ -d "$d" ]; then
              name=$(basename "$d")
              echo "Copying $d -> site/$name"
              mkdir -p "site/$name"
              cp -r "$d"/. "site/$name/"
              copied="true"
            fi
          done

          if [ "$copied" != "true" ]; then
            echo "WARNING: No known frontend docs output folder found. Nothing copied."
          fi

      # ---------- Backend docs (MkDocs via Poetry) ----------
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            backend/.venv
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-docs-py3.13-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-docs-py3.13-
            ${{ runner.os }}-poetry-

      - name: Install project docs deps via Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade poetry
          poetry config virtualenvs.in-project true
          cd backend
          poetry install --no-interaction --no-ansi --with dev

      - name: Export OpenAPI JSON for docs
        working-directory: backend
        run: poetry run python scripts/dump_openapi.py --dev

      - name: Copy prompts to docs for MkDocs
        run: |
          mkdir -p docs/docs/llm/prompts
          cp -r .github/prompts/* docs/docs/llm/prompts/

      - name: Build MkDocs site into /site
        run: |
          cd backend
          poetry run mkdocs build -f ../docs/mkdocs.yml -d ../site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # ---------- Deploy to GitHub Pages ----------
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: docs-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  # ---------- Notify ----------
  notify:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-teaching, deploy-pages]
    if: always()
    steps:
      - name: Notify Slack on success
        if: ${{ needs.deploy-staging.result == 'success' && needs.deploy-teaching.result == 'success' && needs.deploy-pages.result == 'success' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Deployed to staging + teaching + GitHub Pages",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Deployed to staging + teaching + GitHub Pages*\n\n*Commit:* ${{ github.event.head_commit.message }}\n*Author:* ${{ github.actor }}\n*SHA:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }

      - name: Notify Slack on failure
        if: ${{ needs.deploy-staging.result == 'failure' || needs.deploy-teaching.result == 'failure' || needs.deploy-pages.result == 'failure' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Staging/teaching/Pages deploy failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Staging/teaching/Pages deploy failed*\n\n*Commit:* ${{ github.event.head_commit.message }}\n*Author:* ${{ github.actor }}\n*SHA:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
