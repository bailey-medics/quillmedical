# Build and deploy documentation to GitHub Pages when relevant files change.
name: Documentation

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docs/**"
      - "shared/**"
      - ".github/prompts/**"

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  # ---------- Build documentation ----------
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    env:
      OPENAPI_SRC: docs/docs/code/swagger/openapi.json
      OPENAPI_DST: site/code/swagger/openapi.json
    steps:
      - uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      # ---------- Frontend docs (Node + Yarn) ----------
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack & pin Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate
          yarn --version

      - name: Cache Yarn dependencies
        uses: actions/cache@v5
        with:
          path: |
            frontend/.yarn/cache
            frontend/.yarn/install-state.gz
            frontend/node_modules
          key: ${{ runner.os }}-yarn4-docs-${{ hashFiles('frontend/yarn.lock', 'frontend/.yarnrc.yml') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-docs-
            ${{ runner.os }}-yarn4-

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Cache Storybook & Vite build artifacts
        uses: actions/cache@v5
        with:
          path: |
            frontend/node_modules/.vite
            frontend/.storybook-cache
            frontend/storybook-static
          key: ${{ runner.os }}-storybook-build-${{ hashFiles('frontend/src/**/*.{ts,tsx,js,jsx,json}', 'frontend/.storybook/**/*') }}
          restore-keys: |
            ${{ runner.os }}-storybook-build-

      - name: Generate JSON from YAML for TypeScript types
        working-directory: frontend
        run: yarn generate:types

      - name: Build Storybook static site
        working-directory: frontend
        run: yarn storybook:build

      - name: Build frontend docs
        working-directory: frontend
        run: yarn docs:build

      - name: Collect frontend docs into /site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site

          CANDIDATES=(
            "docs/docs/frontend"
            "docs/docs/storybook"
          )

          copied="false"
          for d in "${CANDIDATES[@]}"; do
            if [ -d "$d" ]; then
              name=$(basename "$d")
              echo "Copying $d -> site/$name"
              mkdir -p "site/$name"
              cp -r "$d"/. "site/$name/"
              copied="true"
            fi
          done

          if [ "$copied" != "true" ]; then
            echo "WARNING: No known frontend docs output folder found. Nothing copied."
          fi

      # ---------- Backend docs (MkDocs via Poetry) ----------
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Cache Poetry dependencies
        uses: actions/cache@v5
        with:
          path: |
            backend/.venv
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-docs-py3.13-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-docs-py3.13-
            ${{ runner.os }}-poetry-

      - name: Install project docs deps via Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade poetry
          poetry config virtualenvs.in-project true
          cd backend
          poetry install --no-interaction --no-ansi --with dev

      - name: Export OpenAPI JSON for docs
        working-directory: backend
        run: poetry run python scripts/dump_openapi.py --dev

      - name: Copy prompts to docs for MkDocs
        run: |
          mkdir -p docs/docs/llm/prompts
          cp -r .github/prompts/* docs/docs/llm/prompts/

      - name: Build MkDocs site into /site
        run: |
          cd backend
          poetry run mkdocs build -f ../docs/mkdocs.yml -d ../site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  # ---------- Deploy to GitHub Pages ----------
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  # ---------- Notify ----------
  notify:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Notify Slack on success
        if: ${{ needs.deploy.result == 'success' }}
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Documentation deployed to GitHub Pages",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Documentation deployed to GitHub Pages*\n\n*Commit:* ${{ github.event.head_commit.message }}\n*Author:* ${{ github.actor }}\n*SHA:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }

      - name: Notify Slack on failure
        if: ${{ needs.deploy.result == 'failure' }}
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Documentation deploy failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Documentation deploy failed*\n\n*Commit:* ${{ github.event.head_commit.message }}\n*Author:* ${{ github.actor }}\n*SHA:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
