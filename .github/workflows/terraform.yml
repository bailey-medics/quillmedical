# Terraform plan on PRs, apply on merge to main (staging/teaching) or clinical-live (prod)
name: Terraform

on:
  push:
    branches: [main, clinical-live]
    paths:
      - "infra/**"
      - "!infra/github/**"
  pull_request:
    branches: [main, clinical-live]
    paths:
      - "infra/**"
      - "!infra/github/**"

permissions:
  contents: read
  id-token: write       # Workload Identity Federation
  pull-requests: write   # Post plan as PR comment

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Terraform plan (PRs only) ----------
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        include:
          # staging disabled — environment spun down to save GCP costs
          # - environment: staging
          #   workspace: staging
          #   wif_provider_secret: GCP_STAGING_WIF_PROVIDER
          #   service_account_secret: GCP_STAGING_SERVICE_ACCOUNT
          - environment: teaching
            workspace: teaching
            wif_provider_secret: GCP_TEACHING_WIF_PROVIDER
            service_account_secret: GCP_TEACHING_SERVICE_ACCOUNT
          - environment: prod
            workspace: production
            wif_provider_secret: GCP_PROD_WIF_PROVIDER
            service_account_secret: GCP_PROD_SERVICE_ACCOUNT
    steps:
      - uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.14"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets[matrix.wif_provider_secret] }}
          service_account: ${{ secrets[matrix.service_account_secret] }}

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false

      - name: Select workspace
        working-directory: infra
        run: terraform workspace select ${{ matrix.workspace }}

      - name: Terraform plan
        id: plan
        working-directory: infra
        run: |
          terraform plan \
            -var-file=environments/${{ matrix.environment }}/terraform.tfvars \
            -input=false \
            -no-color \
            -out=tfplan \
            2>&1 | tee plan-output.txt

      - name: Post plan to PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan-output.txt', 'utf8');
            const maxLen = 60000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;

            const body = `### Terraform Plan: \`${{ matrix.environment }}\`

            \`\`\`
            ${truncated}
            \`\`\`

            *Workflow:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ---------- Terraform apply: teaching (main branch) ----------
  apply-staging:
    name: Apply (${{ matrix.environment }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          # staging disabled — environment spun down to save GCP costs
          # - environment: staging
          #   workspace: staging
          #   wif_provider_secret: GCP_STAGING_WIF_PROVIDER
          #   service_account_secret: GCP_STAGING_SERVICE_ACCOUNT
          - environment: teaching
            workspace: teaching
            wif_provider_secret: GCP_TEACHING_WIF_PROVIDER
            service_account_secret: GCP_TEACHING_SERVICE_ACCOUNT
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.14"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets[matrix.wif_provider_secret] }}
          service_account: ${{ secrets[matrix.service_account_secret] }}

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false

      - name: Select workspace
        working-directory: infra
        run: terraform workspace select ${{ matrix.workspace }}

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform apply \
            -var-file=environments/${{ matrix.environment }}/terraform.tfvars \
            -input=false \
            -auto-approve

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v3.0.2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Terraform apply failed (${{ matrix.environment }})",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Terraform apply failed (${{ matrix.environment }})*\n\n*Author:* ${{ github.actor }}\n*SHA:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }

  # ---------- Terraform apply: production (clinical-live branch) ----------
  apply-production:
    name: Apply (prod)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/clinical-live'
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.14"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_PROD_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_PROD_SERVICE_ACCOUNT }}

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false

      - name: Select workspace
        working-directory: infra
        run: terraform workspace select production

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform apply \
            -var-file=environments/prod/terraform.tfvars \
            -input=false \
            -auto-approve

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v3.0.2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Terraform apply failed (production)",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Terraform apply failed (production)*\n\n*Author:* ${{ github.actor }}\n*SHA:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
