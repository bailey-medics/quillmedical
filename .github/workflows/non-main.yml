# Workflow for release/* and hotfix/* branches, and pull requests.
# Runs all code quality checks via the reusable _checks.yml workflow.
#
# Feature branches are handled by feature.yml instead.
name: Branch checks

on:
  push:
    branches:
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches: [main, clinical-live]

permissions:
  contents: read

concurrency:
  group: nonmain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Run checks
    uses: ./.github/workflows/_checks.yml
    secrets: inherit
