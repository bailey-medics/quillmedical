# Deploy public marketing site to GCS landing buckets.
# Builds the public_pages Vite workspace and syncs to the landing bucket
# in both staging and production projects.
name: Deploy public site

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "frontend/public_pages/**"
      - "frontend/public/**"
      - "frontend/src/components/**"
      - "frontend/src/theme.ts"
      - "frontend/src/styles/**"

permissions:
  contents: read
  id-token: write # Workload Identity Federation

concurrency:
  group: deploy-public-site
  cancel-in-progress: true

jobs:
  build:
    name: Build public pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --immutable

      - name: Build public pages
        working-directory: frontend
        run: yarn workspace public-pages build

      - uses: actions/upload-artifact@v6
        with:
          name: public-site
          path: frontend/dist/public_pages/

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging

    steps:
      - uses: actions/download-artifact@v6
        with:
          name: public-site
          path: public-site/

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      # Sync files to the landing bucket. Set cache headers:
      # - Hashed assets (js/css): 1 year immutable cache
      # - Static assets (images, icons, manifest): 30 day cache
      # - HTML files: no-cache (always revalidate)
      - name: Upload to GCS
        run: |
          BUCKET="${{ secrets.GCP_STAGING_PROJECT_ID }}-landing"

          # Upload hashed assets with aggressive caching
          gsutil -m -h "Cache-Control:public, max-age=31536000, immutable" \
            rsync -r -x '.*\.html$' public-site/assets/ "gs://${BUCKET}/assets/"

          # Upload static assets (images, icons, manifest, service worker)
          gsutil -m -h "Cache-Control:public, max-age=2592000" \
            cp public-site/*.png public-site/*.ico public-site/*.webmanifest public-site/*.js "gs://${BUCKET}/"

          # Upload HTML files with no-cache
          gsutil -m -h "Cache-Control:no-cache" \
            cp public-site/*.html "gs://${BUCKET}/"

      - name: Verify deployment
        run: |
          BUCKET="${{ secrets.GCP_STAGING_PROJECT_ID }}-landing"
          echo "Checking bucket contents..."
          gsutil ls "gs://${BUCKET}/"
          gsutil ls "gs://${BUCKET}/assets/"

