# Deploy to production when clinical-live is updated via a release/* merge
name: Deploy to production

on:
  push:
    branches: [clinical-live]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "safety/**"
      - ".github/prompts/**"

permissions:
  contents: read
  id-token: write   # Workload Identity Federation

concurrency:
  group: deploy-production
  cancel-in-progress: false   # Never cancel a production deploy

env:
  GCP_REGION: europe-west2
  AR_REGISTRY: europe-west2-docker.pkg.dev
  VITE_VAPID_PUBLIC: BC0B26JO27tGc5qkbt2-QzY8M7_0u3gt5hmFj1RGWvZp9Vr9fDQ3-lpQ6YxqNlU0fFKlIUzCnb-baAE0rzIL-Ys

jobs:
  # ---------- Detect which services changed ----------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - "backend/**"
              - "shared/**"
            frontend:
              - "frontend/**"
              - "shared/**"

  # ---------- Build and push Docker images ----------
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            changed: ${{ needs.changes.outputs.backend }}
          - service: frontend
            context: .
            dockerfile: ./frontend/Dockerfile
            changed: ${{ needs.changes.outputs.frontend }}
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ matrix.changed == 'true' }}

      - name: Authenticate to GCP (production)
        if: ${{ matrix.changed == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_PROD_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_PROD_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        if: ${{ matrix.changed == 'true' }}
        run: gcloud auth configure-docker ${{ env.AR_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        if: ${{ matrix.changed == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: ${{ matrix.changed == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.AR_REGISTRY }}/${{ secrets.GCP_PROD_PROJECT_ID }}/quill/${{ matrix.service }}:clinical-live-${{ github.sha }}
            ${{ env.AR_REGISTRY }}/${{ secrets.GCP_PROD_PROJECT_ID }}/quill/${{ matrix.service }}:latest
          build-args: |
            VITE_VAPID_PUBLIC=${{ env.VITE_VAPID_PUBLIC }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- Deploy to production ----------
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: always() && !failure() && !cancelled()
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (production)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_PROD_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_PROD_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend to production
        if: ${{ needs.changes.outputs.backend == 'true' }}
        run: |
          gcloud run services update quill-backend-prod \
            --project=${{ secrets.GCP_PROD_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --image=${{ env.AR_REGISTRY }}/${{ secrets.GCP_PROD_PROJECT_ID }}/quill/backend:clinical-live-${{ github.sha }}

      - name: Deploy frontend to production
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        run: |
          gcloud run services update quill-frontend-prod \
            --project=${{ secrets.GCP_PROD_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --image=${{ env.AR_REGISTRY }}/${{ secrets.GCP_PROD_PROJECT_ID }}/quill/frontend:clinical-live-${{ github.sha }}

      - name: Smoke test production
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://app.quill-medical.com/api/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Production health check failed after 5 attempts"
          exit 1

  # ---------- Notify ----------
  notify:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Notify Slack on success
        if: ${{ needs.deploy.result == 'success' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Deployed to production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚀 Deployed to production*\n\n*Commit:* ${{ github.event.head_commit.message }}\n*Author:* ${{ github.actor }}\n*SHA:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }

      - name: Notify Slack on failure
        if: ${{ needs.deploy.result == 'failure' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Production deploy failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Production deploy failed*\n\n*Commit:* ${{ github.event.head_commit.message }}\n*Author:* ${{ github.actor }}\n*SHA:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
