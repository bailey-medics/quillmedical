# Deploy to staging + teaching environments when main branch is updated.
name: Deploy to staging and teaching

on:
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write   # Workload Identity Federation

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  GCP_REGION: europe-west2
  AR_REGISTRY: europe-west2-docker.pkg.dev
  VITE_VAPID_PUBLIC: BC0B26JO27tGc5qkbt2-QzY8M7_0u3gt5hmFj1RGWvZp9Vr9fDQ3-lpQ6YxqNlU0fFKlIUzCnb-baAE0rzIL-Ys

jobs:
  # ---------- Detect which services changed ----------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.result.outputs.backend }}
      frontend: ${{ steps.result.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - "backend/**"
              - "shared/**"
            frontend:
              - "frontend/**"
              - "shared/**"

      # workflow_dispatch always builds everything
      - name: Resolve outputs
        id: result
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=${{ steps.filter.outputs.backend }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
          fi

  # ---------- Build and push Docker images ----------
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      matrix:
        include:
          - service: backend
            context: .
            dockerfile: ./backend/Dockerfile
            changed: ${{ needs.changes.outputs.backend }}
            target: prod
          - service: frontend
            context: .
            dockerfile: ./frontend/Dockerfile
            changed: ${{ needs.changes.outputs.frontend }}
            target: prod
    # Only build if the service actually changed
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ matrix.changed == 'true' }}

      - name: Authenticate to GCP (staging)
        if: ${{ matrix.changed == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        if: ${{ matrix.changed == 'true' }}
        run: gcloud auth configure-docker ${{ env.AR_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        if: ${{ matrix.changed == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Build and push to staging AR
        if: ${{ matrix.changed == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.AR_REGISTRY }}/${{ secrets.GCP_STAGING_PROJECT_ID }}/quill/${{ matrix.service }}:main-${{ github.sha }}
            ${{ env.AR_REGISTRY }}/${{ secrets.GCP_STAGING_PROJECT_ID }}/quill/${{ matrix.service }}:main
          build-args: |
            VITE_VAPID_PUBLIC=${{ env.VITE_VAPID_PUBLIC }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pull image back from staging AR while we still have staging credentials.
      # Buildx pushes directly to the registry without keeping a local copy.
      - name: Pull image from staging AR
        if: ${{ matrix.changed == 'true' }}
        run: |
          docker pull ${{ env.AR_REGISTRY }}/${{ secrets.GCP_STAGING_PROJECT_ID }}/quill/${{ matrix.service }}:main-${{ github.sha }}

      - name: Authenticate to GCP (teaching)
        if: ${{ matrix.changed == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_TEACHING_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_TEACHING_SERVICE_ACCOUNT }}

      - name: Configure Docker for teaching AR
        if: ${{ matrix.changed == 'true' }}
        run: gcloud auth configure-docker ${{ env.AR_REGISTRY }} --quiet

      - name: Tag and push to teaching AR
        if: ${{ matrix.changed == 'true' }}
        run: |
          STAGING_IMAGE=${{ env.AR_REGISTRY }}/${{ secrets.GCP_STAGING_PROJECT_ID }}/quill/${{ matrix.service }}:main-${{ github.sha }}
          TEACHING_SHA=${{ env.AR_REGISTRY }}/${{ secrets.GCP_TEACHING_PROJECT_ID }}/quill/${{ matrix.service }}:main-${{ github.sha }}
          TEACHING_MAIN=${{ env.AR_REGISTRY }}/${{ secrets.GCP_TEACHING_PROJECT_ID }}/quill/${{ matrix.service }}:main

          docker tag "$STAGING_IMAGE" "$TEACHING_SHA"
          docker tag "$STAGING_IMAGE" "$TEACHING_MAIN"
          docker push "$TEACHING_SHA"
          docker push "$TEACHING_MAIN"

  # ---------- Deploy to staging ----------
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [changes, build]
    # Run even if build was skipped (no changes), to handle shared infra updates
    if: always() && !failure() && !cancelled()
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (staging)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_STAGING_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_STAGING_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend to staging
        if: ${{ needs.changes.outputs.backend == 'true' }}
        run: |
          gcloud run services update quill-backend-staging \
            --project=${{ secrets.GCP_STAGING_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --image=${{ env.AR_REGISTRY }}/${{ secrets.GCP_STAGING_PROJECT_ID }}/quill/backend:main-${{ github.sha }}

      - name: Deploy frontend to staging
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        run: |
          gcloud run services update quill-frontend-staging \
            --project=${{ secrets.GCP_STAGING_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --image=${{ env.AR_REGISTRY }}/${{ secrets.GCP_STAGING_PROJECT_ID }}/quill/frontend:main-${{ github.sha }}

      - name: Smoke test staging
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://staging.quill-medical.com/api/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Staging health check failed after 5 attempts"
          exit 1

  # ---------- Deploy to teaching ----------
  deploy-teaching:
    name: Deploy to teaching
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: always() && !failure() && !cancelled()
    environment: teaching
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (teaching)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_TEACHING_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_TEACHING_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend to teaching
        if: ${{ needs.changes.outputs.backend == 'true' }}
        run: |
          gcloud run services update quill-backend-teaching \
            --project=${{ secrets.GCP_TEACHING_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --image=${{ env.AR_REGISTRY }}/${{ secrets.GCP_TEACHING_PROJECT_ID }}/quill/backend:main-${{ github.sha }}

      - name: Deploy frontend to teaching
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        run: |
          gcloud run services update quill-frontend-teaching \
            --project=${{ secrets.GCP_TEACHING_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --image=${{ env.AR_REGISTRY }}/${{ secrets.GCP_TEACHING_PROJECT_ID }}/quill/frontend:main-${{ github.sha }}

      - name: Smoke test teaching
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://teaching.quill-medical.com/api/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Teaching health check passed"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Teaching health check failed after 5 attempts"
          exit 1

  # ---------- Notify ----------
  notify:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-teaching]
    if: always()
    steps:
      - name: Notify Slack on success
        if: ${{ needs.deploy-staging.result == 'success' && needs.deploy-teaching.result == 'success' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Deployed to staging + teaching",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Deployed to staging + teaching*\n\n*Commit:* ${{ github.event.head_commit.message }}\n*Author:* ${{ github.actor }}\n*SHA:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }

      - name: Notify Slack on failure
        if: ${{ needs.deploy-staging.result == 'failure' || needs.deploy-teaching.result == 'failure' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Staging/teaching deploy failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Staging/teaching deploy failed*\n\n*Commit:* ${{ github.event.head_commit.message }}\n*Author:* ${{ github.actor }}\n*SHA:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
