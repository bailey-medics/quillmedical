# compose.prod.cloud-run.yml
# Production compose for Cloud Run deployment (backend + frontend)
# Usage: docker compose -f compose.prod.cloud-run.yml build

services:
  backend:
    build:
      context: ./backend
      target: prod
    container_name: quill_backend
    environment:
      BACKEND_ENV: production
      SECURE_COOKIES: "true"
      COOKIE_DOMAIN: ".quill-medical.com"
      # CORS_ORIGINS set per environment via Secret Manager / Cloud Run env:
      #   prod:    '["https://app.quill-medical.com","https://quill-medical.com"]'
      #   staging: '["https://staging.quill-medical.com"]'
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: prod
    container_name: quill_frontend
    expose:
      - "80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped
